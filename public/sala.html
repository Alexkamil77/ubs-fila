<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Espera - UBS SESC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f8ff; }
        .patient-called-high-priority { color: #ef4444; /* Vermelho */ }
        .blinking-text { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.4; } }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background-color: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%;}
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e0e7ff; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #818cf8; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="container mx-auto p-4 md:p-8 flex-grow">
        <header class="bg-white p-6 rounded-xl shadow-lg mb-8 border-t-4 border-blue-500">
            <div id="patientCalledSection" class="text-center min-h-[120px] flex flex-col justify-center">
                <p class="text-2xl md:text-3xl text-gray-500">Aguardando chamada...</p>
                </div>
            <div class="mt-4 flex flex-col md:flex-row justify-between items-center text-center md:text-left border-t pt-4">
                <div>
                    <p class="text-xl font-semibold text-blue-700">UBS SESC</p>
                    <p class="text-md text-blue-600">Equipe: Cristina C. / Dr. Alexander Jimenez Ocana</p> <p id="doctorsOnlineDisplay" class="text-md text-blue-600">Médicos Online: <span class="font-medium">Aguardando...</span></p> </div>
                <div class="mt-4 md:mt-0 text-right">
                    <p id="currentDate" class="text-lg text-gray-700"></p>
                    <p id="currentTime" class="text-3xl font-bold text-blue-800"></p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 bg-indigo-50 p-6 rounded-xl shadow-lg">
                <h2 class="text-2xl font-semibold text-indigo-700 mb-4 text-center">Próximos Pacientes</h2>
                <div id="waitingListDisplay" class="space-y-3 max-h-96 overflow-y-auto custom-scrollbar bg-white p-4 rounded-lg shadow-inner">
                    <p class="text-gray-500 text-center py-4">Nenhum paciente na fila.</p>
                </div>
            </div>

            <div class="md:col-span-2 bg-black p-1 rounded-xl shadow-lg">
                 <h2 class="text-2xl font-semibold text-white mb-3 text-center pt-3">Entretenimento</h2>
                <div id="videoPlayerContainer" class="video-container rounded-md">
                    <p class="flex items-center justify-center h-full text-white text-lg">Nenhum vídeo selecionado.</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 bg-blue-700 text-white">
        <p>&copy; <span id="currentYear"></span> UBS SESC Atendimento. Tenha um ótimo dia!</p>
    </footer>

    <script src="/socket.io/socket.io.js"></script> <script>
        // Conecta ao servidor Socket.IO
        const socket = io();

        const synth = window.speechSynthesis;
        let voices = [];
        let callIntervalId = null; // Para repetir a chamada de voz
        let lastCalledPatientInfo = null; // Para repetir a chamada correta

        // Elementos da UI
        const patientCalledSection = document.getElementById('patientCalledSection');
        const doctorsOnlineDisplayEl = document.getElementById('doctorsOnlineDisplay').querySelector('span'); // Renomeado
        const waitingListDisplay = document.getElementById('waitingListDisplay');
        const videoPlayerContainer = document.getElementById('videoPlayerContainer');
        const currentDateEl = document.getElementById('currentDate');
        const currentTimeEl = document.getElementById('currentTime');
        document.getElementById('currentYear').textContent = new Date().getFullYear();

         // --- Lógica de Conexão e Eventos do Socket ---
        socket.on('connect', () => {
            console.log('Sala de espera conectada ao servidor Socket.IO');
             // Ao conectar, o servidor enviará o estado atual
        });

        socket.on('disconnect', () => {
            console.log('Sala de espera desconectada do servidor Socket.IO');
             // Limpar exibição ou mostrar mensagem de desconexão
             clearCalledPatient();
             updateWaitingList([]);
             updateVideoPlayer(null);
             updateDoctorDisplay([]); // Limpa a lista de médicos online
        });

        // Recebe o estado inicial do servidor ao conectar
        socket.on('current_state', (state) => {
            console.log('Estado inicial recebido:', state);
            updateWaitingList(state.patients);
            if (state.calling) {
                 // O objeto 'calling' do servidor já inclui 'calledByDoctor'
                displayCalledPatient(state.calling, state.calling.calledByDoctor);
            } else {
                clearCalledPatient();
            }
            updateVideoPlayer(state.video);
            updateDoctorDisplay(state.doctors); // Atualiza a lista de médicos online
        });


        // Recebe atualizações da fila de pacientes do servidor
        socket.on('queue_updated', (updatedQueue) => {
            console.log('Fila atualizada recebida:', updatedQueue);
            updateWaitingList(updatedQueue);
        });

        // Recebe informações sobre o paciente que ESTÁ sendo chamado
        socket.on('patient_called', (calledPatientInfo) => {
            console.log('Paciente sendo chamado:', calledPatientInfo);
             // O objeto 'calledPatientInfo' já inclui 'calledByDoctor' do servidor
            displayCalledPatient(calledPatientInfo, calledPatientInfo.calledByDoctor);
        });

        // Recebe o sinal de que a chamada foi parada
        socket.on('call_stopped', () => {
            console.log('Chamada parada.');
            clearCalledPatient();
        });

        // Recebe atualizações do vídeo para a sala de espera
        socket.on('video_updated', (videoUrl) => {
            console.log('Vídeo atualizado recebido:', videoUrl);
            updateVideoPlayer(videoUrl);
        });

         // Recebe a lista atualizada de nomes de médicos online
         socket.on('doctor_list_updated', (doctorNames) => {
             console.log('Lista de médicos online atualizada:', doctorNames);
             updateDoctorDisplay(doctorNames);
         });

        // --- Funções de UI e Exibição ---

        function loadVoices() {
            voices = synth.getVoices().filter(voice => voice.lang.startsWith('pt'));
            if (voices.length === 0 && speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => {
                    voices = synth.getVoices().filter(voice => voice.lang.startsWith('pt'));
                     console.log("Vozes em português carregadas após evento.");
                };
            } else {
                 console.log("Vozes em português carregadas imediatamente.");
            }
        }
        loadVoices(); // Tenta carregar as vozes imediatamente

        function speak(text, patientPriority) {
            if (!synth) {
                 console.warn("Speech Synthesis API não suportada neste navegador.");
                 return;
            }
            if (synth.speaking) {
                synth.cancel();
            }
            const utterance = new SpeechSynthesisUtterance(text);
            // Tenta encontrar uma voz feminina em português
            let ptFemaleVoice = voices.find(voice => voice.lang.startsWith('pt') && (voice.name.toLowerCase().includes('female') || voice.name.toLowerCase().includes('feminina') || voice.name.toLowerCase().includes('brazil')));
            if (!ptFemaleVoice && voices.length > 0) { // Fallback para qualquer voz em PT
                 ptFemaleVoice = voices.find(voice => voice.lang.startsWith('pt'));
            }
             if (!ptFemaleVoice && synth.getVoices().length > 0) { // Fallback para a primeira voz disponível se não houver PT
                 ptFemaleVoice = synth.getVoices()[0];
            }

            if (ptFemaleVoice) {
                utterance.voice = ptFemaleVoice;
                utterance.lang = ptFemaleVoice.lang;
                 console.log("Usando voz:", ptFemaleVoice.name, ptFemaleVoice.lang);
            } else {
                 utterance.lang = 'pt-BR';
                 console.warn("Nenhuma voz em português encontrada, usando padrão pt-BR.");
            }
            utterance.rate = 0.9;
            utterance.pitch = 1.1; // Voz um pouco mais suave/aguda

            utterance.onstart = () => {
                patientCalledSection.classList.add('blinking-text');
            };
            utterance.onend = () => {
                 // Mantém o blink um pouco mais visível antes de remover
                 setTimeout(() => patientCalledSection.classList.remove('blinking-text'), 1000);
            };
            utterance.onerror = (event) => {
                console.error("Erro na síntese de voz:", event);
                patientCalledSection.classList.remove('blinking-text');
            }
            synth.speak(utterance);
        }

        function updateDateTime() {
            const now = new Date();
            currentDateEl.textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            currentTimeEl.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        function displayCalledPatient(patientInfo, doctorName) { // patientInfo agora é o objeto do servidor
            lastCalledPatientInfo = patientInfo; // Salva para repetição da chamada
            patientCalledSection.innerHTML = `
                <p class="text-4xl md:text-5xl font-bold ${patientInfo.priority === 'high' ? 'patient-called-high-priority' : 'text-green-600'}">
                    ${patientInfo.name}
                </p>
                ${patientInfo.priority === 'high' ? '<p class="text-2xl text-red-500 font-semibold mt-1">ATENDIMENTO PRIORITÁRIO</p>' : ''}
                <p class="text-xl md:text-2xl text-gray-700 mt-2">Por favor, dirija-se ao consultório:</p>
                <p class="text-2xl md:text-3xl font-semibold text-blue-700">${doctorName || 'Médico Responsável'}</p> `;
             // Ajusta a frase da chamada de voz para incluir o nome do médico
            const announcement = `${patientInfo.name}, ${patientInfo.priority === 'high' ? 'atendimento prioritário,' : ''} por favor, dirija-se ao consultório do Doutor ${doctorName || 'responsável'}.`;
            speak(announcement, patientInfo.priority);

            // Limpa qualquer intervalo de chamada anterior e inicia um novo
            if (callIntervalId) clearInterval(callIntervalId);
            callIntervalId = setInterval(() => {
                if (lastCalledPatientInfo) { // Verifica se ainda há um paciente sendo chamado
                     speak(announcement, lastCalledPatientInfo.priority); // Repete a chamada com a info salva
                } else {
                    clearInterval(callIntervalId); // Para o intervalo se não houver mais paciente
                    callIntervalId = null;
                }
            }, 30000); // Chama a cada 30 segundos (ajustável)
        }

        function clearCalledPatient() {
            lastCalledPatientInfo = null; // Limpa a informação do último chamado
            if (callIntervalId) clearInterval(callIntervalId); // Para o intervalo de repetição
            callIntervalId = null;
            patientCalledSection.innerHTML = '<p class="text-2xl md:text-3xl text-gray-500">Aguardando chamada...</p>';
            patientCalledSection.classList.remove('blinking-text');
             if (synth.speaking) { // Para a fala se estiver ocorrendo
                synth.cancel();
            }
        }

        function updateWaitingList(patients) { // Recebe a lista atualizada do servidor
            waitingListDisplay.innerHTML = '';
            // Filtra a lista para não mostrar o paciente que está sendo chamado no momento (se houver)
            const patientsToShow = patients.filter(p => !lastCalledPatientInfo || p.id !== lastCalledPatientInfo.id);


            if (patientsToShow.length === 0) {
                waitingListDisplay.innerHTML = '<p class="text-gray-500 text-center py-4">Nenhum paciente aguardando na fila.</p>';
                return;
            }
            // Mostra até 10 próximos pacientes na lista de espera
            patientsToShow.slice(0, 10).forEach((patient, index) => {
                const div = document.createElement('div');
                // Inclui o nome do médico que adicionou o paciente
                div.className = `p-3 rounded-md shadow-sm text-center ${patient.priority === 'high' ? 'bg-red-100 border-l-4 border-red-500' : 'bg-green-100 border-l-4 border-green-500'}`;
                div.innerHTML = `
                    <p class="font-semibold text-gray-800 text-lg">${index + 1}. ${patient.name}</p>
                    <p class="text-sm text-gray-600 italic">Adicionado por: ${patient.addedByDoctor || 'N/A'}</p> ${patient.priority === 'high' ? '<p class="text-sm text-red-700 font-medium">PRIORIDADE</p>' : '<p class="text-sm text-green-700">Normal</p>'}
                `;
                waitingListDisplay.appendChild(div);
            });
        }

        function updateVideoPlayer(videoUrl) { // Recebe o URL do vídeo do servidor
            if (videoUrl) {
                // Usa o URL diretamente (assumindo que o backend já formatou para embed)
                videoPlayerContainer.innerHTML = `<iframe src="${videoUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
            } else {
                videoPlayerContainer.innerHTML = '<p class="flex items-center justify-center h-full text-white text-lg">Nenhum vídeo selecionado.</p>';
            }
        }

        function updateDoctorDisplay(doctorNames) { // Recebe a lista de nomes de médicos online
            if (doctorNames && doctorNames.length > 0) {
                 doctorsOnlineDisplayEl.textContent = doctorNames.join(', ');
            } else {
                 doctorsOnlineDisplayEl.textContent = 'Nenhum médico online.';
            }
        }

        // O evento DOMContentLoaded e a lógica de localStorage/BroadcastChannel foram removidos
        // A inicialização do estado acontece automaticamente quando o Socket.IO conecta
        // e o servidor envia o evento 'current_state'.

    </script>
</body>
</html>
